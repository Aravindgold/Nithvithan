<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nithvithan 1st Birthday Celebration</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    font-family: 'Trebuchet MS', sans-serif;
    min-height:100vh;
    height:100vh;
    background:linear-gradient(135deg,#ff8dc7,#8fd3ff,#fff2a8);
    animation:bgmove 10s infinite alternate;
    position:relative;
}

@keyframes bgmove{
    0%{filter:hue-rotate(0deg);}
    100%{filter:hue-rotate(25deg);}
}

.container{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    z-index:10;
    padding:15px; /* Keeps card safe from hitting edges on mobile */
}

.card{
    width:100%;
    max-width:650px; /* Better fitting for multi-device widths */
    padding:30px 20px;
    border-radius:25px;
    background:rgba(255,255,255,0.18);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px); /* Safari support */
    box-shadow:0 10px 40px rgba(0,0,0,0.15);
    animation:floatcard 4s ease-in-out infinite;
}

@keyframes floatcard{
    0%,100%{transform:translateY(0px);}
    50%{transform:translateY(-10px);}
}

/* Highly responsive typography sizing scales based on viewport */
.title{
    font-size: clamp(28px, 6vw, 48px);
    color:white;
    text-shadow:0 0 20px #ff1493;
    animation:glow 2s infinite alternate;
    line-height: 1.2;
}

@keyframes glow{
    from{text-shadow:0 0 15px #fff;}
    to{text-shadow:0 0 35px #ff0080;}
}

.name{
    margin-top:15px;
    font-size: clamp(22px, 5vw, 36px);
    color:#ff0055;
    font-weight:bold;
    line-height: 1.2;
}

.subtitle{
    margin-top:15px;
    font-size: clamp(14px, 3.5vw, 18px);
    color:#333;
    padding: 0 10px;
}

.cake{
    margin-top:15px;
    font-size: clamp(80px, 18vw, 130px);
    animation:bounce 2s infinite;
    user-select: none;
}

@keyframes bounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-15px);}
}

.tap{
    margin-top:20px;
    display:inline-block;
    background:#ff006a;
    color:white;
    padding:12px 25px;
    border-radius:40px;
    font-size: clamp(14px, 3.5vw, 18px);
    animation:pulse 2s infinite;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.05);}
    100%{transform:scale(1);}
}

.footer{
    margin-top:20px;
    color:white;
    font-size: clamp(15px, 4vw, 20px);
    font-weight: bold;
    text-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.float-item{
    position:absolute;
    animation:floatUp linear infinite;
    opacity:0.85;
    user-select: none;
    pointer-events: none;
}

@keyframes floatUp{
    from{
        transform:translateY(110vh) rotate(0deg);
    }
    to{
        transform:translateY(-120px) rotate(360deg);
    }
}

.wish{
    position:absolute;
    padding:10px 18px;
    background:white;
    border-radius:20px;
    font-size: clamp(13px, 3vw, 16px);
    font-weight:bold;
    color:#ff0066;
    box-shadow:0 8px 25px rgba(0,0,0,0.15);
    animation:popup 3s forwards;
    z-index:999;
    pointer-events: none;
    white-space: nowrap; /* Stops text from wrapping oddly on tiny displays */
    transform: translate(-50%, -50%); /* Centers popups accurately on tap location */
}

@keyframes popup{
    0%{
        transform: translate(-50%, -50%) scale(0);
        opacity:0;
    }
    15%{
        transform: translate(-50%, -50%) scale(1.1);
        opacity:1;
    }
    80%{
        opacity:1;
    }
    100%{
        transform: translate(-50%, -120px) scale(0.9);
        opacity:0;
    }
}

.confetti{
    position:absolute;
    width:10px;
    height:10px;
    border-radius:50%;
    animation:fall linear forwards;
    pointer-events: none;
}

@keyframes fall{
    to{
        transform:translateY(120vh) rotate(720deg);
        opacity:0;
    }
}

.music-btn{
    position:absolute;
    top:15px;
    right:15px;
    z-index:1000;
    background:white;
    border:none;
    padding:10px 16px;
    border-radius:30px;
    font-size: 14px;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
    font-weight: bold;
    color: #ff006a;
}
</style>
</head>

<body>

<button class="music-btn" onclick="toggleMusic(event)">🎵 Play Music</button>

<div class="container">
    <div class="card">
        <div class="title">🎉 Happy 1st Birthday 🎉</div>
        <div class="name">Tiny Legend Nithvithan 👑</div>
        <div class="subtitle">
            One year of smiles, happiness, laughter & endless love 💖
        </div>
        <div class="cake">🎂</div>
        <div class="tap">
            ✨ Tap Anywhere For Magical Wishes ✨
        </div>
        <div class="footer">
            With Love From Appa & Amma ❤️
        </div>
    </div>
</div>

<audio id="bgMusic" loop preload="auto">
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
const wishes = [
"Happy Birthday Little Prince 👑",
"May Your Life Be Full of Joy ✨",
"1 Year of Endless Happiness 💖",
"God Bless You Always 🙏",
"Our Tiny Hero Turns One 🎂",
"Sweetest Baby Ever 🥰",
"May Your Smile Shine Forever 🌈",
"Happy Birthday Champ 🎉",
"Lots of Love & Blessings ❤️",
"Little Star of Our Family ⭐",
"You Are Our Greatest Gift 🎁",
"Enjoy Every Tiny Moment 🎈"
];

const music = document.getElementById("bgMusic");
let playing = false;

// Audio context unlock for mobile safari / chrome stability
function unlockAudio() {
    if (!playing) {
        music.play().then(() => {
            document.querySelector(".music-btn").innerHTML = "⏸ Pause Music";
            playing = true;
        }).catch(err => console.log("Audio waiting for explicit interaction"));
    }
}

// Click effect + automatic music play trigger
document.body.addEventListener("click", function(e){
    // Do not trigger popups if clicking the manual toggle button
    if(e.target.classList.contains("music-btn")) return;

    // Smart Music Trigger: Unlocks and plays music on first click anywhere
    unlockAudio();

    // Wish popup creation
    const wish = document.createElement("div");
    wish.className = "wish";
    wish.innerText = wishes[Math.floor(Math.random()*wishes.length)];

    wish.style.left = e.pageX + "px";
    wish.style.top = e.pageY + "px";

    document.body.appendChild(wish);

    setTimeout(()=>{
        wish.remove();
    },3000);

    // Confetti generation
    for(let i=0;i<25;i++){
        const conf = document.createElement("div");
        conf.className = "confetti";
        conf.style.left = e.pageX + "px";
        conf.style.top = e.pageY + "px";
        conf.style.background = `hsl(${Math.random()*360},100%,50%)`;
        conf.style.animationDuration = (Math.random()*2+1.5) + "s";
        document.body.appendChild(conf);

        setTimeout(()=>{
            conf.remove();
        },3500);
    }
});

// Floating background elements
const emojis = ["🎈","🎉","💖","✨","⭐","🧸","🎂","🎁"];

function createFloating(){
    const item = document.createElement("div");
    item.className = "float-item";
    item.innerText = emojis[Math.floor(Math.random()*emojis.length)];
    item.style.left = Math.random()*95 + "vw";
    item.style.fontSize = (Math.random()*25+20) + "px"; /* Scaled down for mobile safety */
    item.style.animationDuration = (Math.random()*6+6) + "s";

    document.body.appendChild(item);

    setTimeout(()=>{
        item.remove();
    },12000);
}

setInterval(createFloating, 600);

// Manual Music Button Toggle
function toggleMusic(event){
    if(event) event.stopPropagation(); // Prevents spawning a wish background block on button click
    
    if(!playing){
        music.play();
        document.querySelector(".music-btn").innerHTML = "⏸ Pause Music";
        playing = true;
    }else{
        music.pause();
        document.querySelector(".music-btn").innerHTML = "🎵 Play Music";
        playing = false;
    }
}
</script>

</body>
</html>
